<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Multimedia</title>
  </head>

  <body>
    <h1>Giới thiệu sản phẩm</h1>

    <!-- SVG logo -->
    <h2>Logo</h2>
    <svg width="100" height="100">
      <circle cx="50" cy="50" r="40" fill="blue" />
      <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20">
        IT
      </text>
    </svg>

    <!-- Ảnh sản phẩm -->
    <h2>Sản phẩm</h2>

    <figure>
      <img
        src="https://via.placeholder.com/300"
        alt="Điện thoại thông minh hiện đại"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Điện thoại thông minh</figcaption>
    </figure>

    <figure>
      <img
        src="https://via.placeholder.com/300"
        alt="Tai nghe không dây chất lượng cao"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Tai nghe không dây</figcaption>
    </figure>

    <figure>
      <img
        src="https://via.placeholder.com/300"
        alt="Laptop hiệu năng cao"
        loading="lazy"
        style="max-width: 100%; height: auto"
      />
      <figcaption>Laptop hiện đại</figcaption>
    </figure>

    <!-- YouTube video mới -->
    <h2>Video giới thiệu (YouTube)</h2>
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/VIDEO_ID"
      title="Video giới thiệu sản phẩm công nghệ"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
      "
      allowfullscreen
    >
    </iframe>

    <!-- Video HTML5 -->
    <h2>Video sản phẩm</h2>
    <video controls poster="https://via.placeholder.com/300" width="500">
      <source
        src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
        type="video/mp4"
      />
      <source
        src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm"
        type="video/webm"
      />
      Trình duyệt của bạn không hỗ trợ video.
    </video>

    <!-- Audio -->
    <h2>Nhạc nền</h2>
    <audio id="audio" controls>
      <source
        src="https://interactive-examples.mdn.mozilla.net/media/cc0-audio/t-rex-roar.mp3"
        type="audio/mpeg"
      />
      Trình duyệt của bạn không hỗ trợ audio.
    </audio>

    <script>
      const audio = document.getElementById("audio");
      audio.addEventListener("play", () => {
        setTimeout(() => {
          audio.pause();
        }, 2000);
      });
    </script>
  </body>
</html>
