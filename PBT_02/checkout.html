<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Checkout - Đặt hàng</title>
    <style>
      body {
        font-family: Arial;
        margin: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
      }
      th,
      td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: center;
      }
      tfoot {
        font-weight: bold;
        background: #f2f2f2;
      }
      form {
        border: 1px solid #ccc;
        padding: 15px;
      }
      label {
        display: block;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>🛒 Giỏ hàng</h2>

    <!-- BONUS: tìm kiếm + datalist -->
    <label for="search">Tìm sản phẩm:</label>
    <input list="products" id="search" name="search" />
    <datalist id="products">
      <option value="Tai nghe Bluetooth"></option>
      <option value="Chuột gaming"></option>
      <option value="Bàn phím cơ"></option>
    </datalist>

    <table>
      <thead>
        <tr>
          <th>STT</th>
          <th>Sản phẩm</th>
          <th>Đơn giá</th>
          <th>Số lượng</th>
          <th>Thành tiền</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Tai nghe Bluetooth</td>
          <td>500,000</td>
          <td>2</td>
          <td>1,000,000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Chuột gaming</td>
          <td>300,000</td>
          <td>1</td>
          <td>300,000</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Bàn phím cơ</td>
          <td>800,000</td>
          <td>1</td>
          <td>800,000</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="4">Tổng cộng</td>
          <td>
            <output>2,100,000</output>
          </td>
        </tr>
      </tfoot>
    </table>

    <!-- BONUS: điểm tích lũy -->
    <label>Điểm tích lũy:</label>
    <meter value="70" min="0" max="100">70%</meter>

    <h2>💳 Thanh toán</h2>

    <form>
      <!-- Phương thức thanh toán -->
      <label>Phương thức thanh toán:</label>
      <label><input type="radio" name="payment" required /> COD</label>
      <label><input type="radio" name="payment" /> Chuyển khoản</label>
      <label><input type="radio" name="payment" /> Ví điện tử</label>

      <!-- Mã giảm giá -->
      <label for="voucher">Mã giảm giá:</label>
      <input
        type="text"
        id="voucher"
        name="voucher"
        pattern="SALE[0-9]{4}"
        placeholder="VD: SALE2026"
      />

      <!-- Ghi chú -->
      <label for="note">Ghi chú:</label>
      <textarea id="note" name="note" rows="3"></textarea>

      <h3>🚚 Thông tin giao hàng</h3>

      <!-- Ngày giao -->
      <label for="date">Ngày giao hàng:</label>
      <input type="date" id="date" name="date" min="2026-04-30" required />

      <!-- Khung giờ -->
      <label for="time">Khung giờ:</label>
      <select id="time" name="time" required>
        <option value="">--Chọn--</option>
        <option>Sáng 8-12h</option>
        <option>Chiều 14-18h</option>
        <option>Tối 18-21h</option>
      </select>

      <!-- Range -->
      <label for="days">Thời gian giao (ngày):</label>
      <input type="range" id="days" name="days" min="1" max="7" step="1" />

      <br /><br />

      <!-- Submit -->
      <button type="submit" aria-label="Xác nhận đặt hàng">
        Xác nhận đặt hàng
      </button>
    </form>
  </body>
</html>
