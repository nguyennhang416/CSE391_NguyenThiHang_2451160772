<!doctype html>
<html>
  <body>
    <h2>Basic Info</h2>

    <form action="/action_page.php">
      <label for="empid">Employee ID:</label><br />
      <input
        type="text"
        id="empid"
        name="empid"
        value="9"
        readonly
      /><br /><br />

      <label for="lname">Last Name:</label><br />
      <input
        type="text"
        id="lname"
        name="lname"
        value="Dodsworth"
      /><br /><br />

      <label for="fname">First Name:</label><br />
      <input type="text" id="fname" name="fname" value="Anne" /><br /><br />

      <label>Gender:</label><br />
      <input type="radio" name="gender" /> Male<br />
      <input type="radio" name="gender" /> Female<br />
      <input type="radio" name="gender" /> XXX<br />
      <input type="radio" name="gender" /> ZZZ<br /><br />

      <label for="title">Title:</label><br />
      <input
        type="text"
        id="title"
        name="title"
        value="Sales Representative"
      /><br /><br />

      <label for="suffix">Suffix:</label><br />
      <input type="text" id="suffix" name="suffix" value="Ms." /><br /><br />

      <label for="birth">BirthDate:</label><br />
      <input type="datetime-local" id="birth" name="birth" /><br /><br />

      <label for="hire">HireDate:</label><br />
      <input type="datetime-local" id="hire" name="hire" /><br /><br />

      <label for="ssn">SSN:</label><br />
      <input type="text" id="ssn" name="ssn" /><br /><br />

      <label for="report">Reports To:</label><br />
      <select id="report" name="report">
        <option>Buchanan</option>
        <option>Andrew</option></select
      ><br /><br />

      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
